<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MBTI 专业版 · 验证码保护</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局装饰 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body {
            background: #eef5f9;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 10% 30%, rgba(205, 180, 220, 0.15) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(150, 200, 230, 0.2) 0%, transparent 40%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 20px, rgba(0,0,0,0.01) 20px, rgba(0,0,0,0.01) 40px);
            pointer-events: none;
            z-index: 0;
        }
        .test-wrapper { width: 100%; max-width: 680px; margin: 0 auto; position: relative; z-index: 2; }

        /* ===== 卡片样式 ===== */
        .card, .result-card, .choice-card, .verification-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 30px 50px -20px rgba(40, 60, 90, 0.25), inset 0 1px 4px rgba(255,255,255,0.8);
            padding: 28px 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }
        .card::after, .result-card::after, .choice-card::after, .verification-card::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(210, 230, 250, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        /* 验证码卡片 */
        .verification-card { text-align: center; padding: 48px 24px; }
        .verification-card input {
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            border: 2px solid #d4e0ed;
            background: white;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }
        .verification-card input:focus { border-color: #8aa9cc; }
        .verify-btn {
            background: linear-gradient(145deg, #2d4f72, #1b3857);
            border: none;
            border-radius: 60px;
            padding: 16px 30px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
        }
        .verify-btn:active { transform: scale(0.98); background: #12314b; }
        .error-msg { color: #c44545; margin-top: 15px; display: none; }

        /* 选择界面 */
        .choice-card { text-align: center; padding: 48px 24px; }
        .choice-title { font-size: 2.2rem; font-weight: 600; color: #1f3a57; margin-bottom: 16px; }
        .choice-sub { color: #4a607a; font-size: 1.2rem; margin-bottom: 40px; }
        .choice-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .choice-btn {
            background: linear-gradient(145deg, #ffffff, #f0f6ff);
            border: 2px solid rgba(120, 150, 190, 0.5);
            border-radius: 80px;
            padding: 20px 36px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #1f3f60;
            cursor: pointer;
            box-shadow: 0 20px 30px -12px #9cb2cf;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 200px;
        }
        .choice-btn small { font-size: 1rem; color: #5b789b; }
        .choice-btn:hover { transform: translateY(-6px); background: white; border-color: #8aa9cc; }

        /* 头部 */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .logo {
            display: flex; align-items: center; gap: 8px; font-weight: 600; color: #2c3f5c; font-size: 1.3rem;
            background: rgba(255,255,255,0.5); padding: 8px 18px; border-radius: 60px; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .logo i { color: #6f8db0; font-size: 1.5rem; }
        .progress-pill {
            background: rgba(230, 240, 250, 0.8); backdrop-filter: blur(4px); border-radius: 60px; padding: 8px 20px;
            font-size: 1rem; font-weight: 500; color: #2c4b6b; border: 1px solid rgba(255,255,255,0.7);
        }
        .badge-info {
            background: #e1eaf2;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #3a5b7a;
            margin-left: 10px;
        }

        /* 题目区域 */
        .question-text {
            font-size: 1.5rem; font-weight: 500; line-height: 1.4; color: #1e3144; margin-bottom: 32px;
            background: rgba(255,255,255,0.4); border-radius: 40px; padding: 20px 24px;
            border-left: 6px solid #9ab5d4; box-shadow: 0 6px 14px rgba(100,120,140,0.1);
        }
        .dimension-tag {
            display: inline-block;
            background: #d4e0ed;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #2b4c6e;
            margin-bottom: 10px;
        }
        .options-grid { display: flex; flex-direction: column; gap: 16px; }
        .option-item label {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border: 2px solid rgba(170, 190, 215, 0.5);
            border-radius: 80px; padding: 18px 20px; font-size: 1.1rem; font-weight: 500; color: #1a344b;
            box-shadow: 0 8px 16px -8px rgba(80,100,130,0.2); transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .option-item input[type="radio"]:checked + label {
            background: #dbe9ff; border-color: #7493b8; box-shadow: 0 10px 20px -8px #5b7da0; transform: scale(1.02);
        }
        .nav-row { margin-top: 28px; border-top: 2px dashed rgba(150, 170, 200, 0.3); padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-prev {
            background: rgba(245, 245, 255, 0.7); backdrop-filter: blur(8px); border: 2px solid #b6cae0; border-radius: 60px;
            padding: 12px 30px; font-weight: 600; color: #2b4d6a; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .btn-prev:disabled { opacity: 0.3; pointer-events: none; }
        .tip-message { color: #5d768b; font-size: 1rem; }

        /* ===== 结果页面装饰 ===== */
        .result-card { padding: 36px 28px; }
        .type-badge-large {
            display: flex; align-items: center; gap: 24px; background: linear-gradient(145deg, #ecf3fc, #dae6f2);
            border-radius: 120px; padding: 22px 30px; margin-bottom: 30px; border: 1px solid white;
            box-shadow: 0 15px 25px -12px #99b4d3; position: relative;
        }
        .type-badge-large::before {
            content: ''; position: absolute; inset: -2px; border-radius: 120px; padding: 2px;
            background: linear-gradient(135deg, #ffffff, #c1d9f0); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude;
            pointer-events: none;
        }
        .type-icon { font-size: 5rem; filter: drop-shadow(0 8px 12px rgba(80,110,140,0.3)); background: white; border-radius: 50%; padding: 12px; }
        .type-letters {
            font-size: 4rem; font-weight: 700; letter-spacing: 8px; background: linear-gradient(145deg, #1f3c5c, #142b40);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 4px 8px rgba(255,255,255,0.5);
        }
        .type-name { font-size: 2rem; font-weight: 500; color: #1e3f5c; margin-bottom: 16px; border-left: 8px solid #a7c0dd; padding-left: 16px; }
        .bars-container { background: rgba(240, 248, 255, 0.6); border-radius: 60px; padding: 24px 20px; backdrop-filter: blur(4px); margin: 30px 0; border: 1px solid rgba(255,255,255,0.8); }
        .bar-dim { margin-bottom: 24px; }
        .dim-label { font-size: 1.1rem; font-weight: 600; color: #2a4c70; margin-bottom: 8px; padding: 0 6px; display: flex; justify-content: space-between; }
        .bar-bg { background: #d5e2f0; height: 28px; border-radius: 40px; box-shadow: inset 0 2px 8px #b3c9e0; display: flex; }
        .bar-left { background: linear-gradient(90deg, #7899c0, #a1c0e0); border-radius: 40px 0 0 40px; box-shadow: 0 4px 10px #98b8da; height: 100%; }
        .bar-right { background: linear-gradient(90deg, #c0d2e8, #dae8f5); border-radius: 0 40px 40px 0; height: 100%; }
        .collapse-section { background: linear-gradient(135deg, #f0f6fe, #e3ecf7); border-radius: 48px; padding: 20px; margin: 30px 0; border: 1px solid rgba(255,255,255,0.8); }
        .collapse-toggle { background: none; border: none; font-size: 1.3rem; font-weight: 600; color: #1f3f60; padding: 10px 8px; width: 100%; text-align: left; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .function-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 20px; }
        .func-item { background: white; border-radius: 40px; padding: 16px 18px; border: 1px solid #cbd9ed; box-shadow: 0 6px 14px #dde5f0; display: flex; flex-direction: column; align-items: center; }
        .func-name { font-weight: 700; color: #1f3b59; font-size: 1.2rem; }
        .func-score { font-size: 1.8rem; font-weight: 600; color: #0b2944; margin-top: 4px; }
        .match-section { background: rgba(245, 250, 255, 0.8); backdrop-filter: blur(8px); border-radius: 60px; padding: 30px 24px; border: 2px solid rgba(255,255,255,0.7); margin: 30px 0; position: relative; }
        .match-section::before { content: '✦'; position: absolute; top: -16px; left: 30px; font-size: 2rem; color: #9cb9da; background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 12px #c1d2e8; }
        .match-title { font-size: 1.4rem; font-weight: 600; color: #1f3f60; margin: 20px 0 16px 0; display: flex; align-items: center; gap: 12px; }
        .match-tag { background: white; border-radius: 80px; padding: 16px 22px; margin-bottom: 16px; font-size: 1.2rem; color: #14344e; border: 1px solid #bed0e8; display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 12px -6px #cbd9ec; }
        .reload-btn {
            background: linear-gradient(145deg, #2d4f72, #1b3857); border: none; border-radius: 80px; padding: 18px 28px;
            font-size: 1.3rem; font-weight: 600; color: white; box-shadow: 0 16px 25px -8px #1f3f60;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 28px;
        }
        .reload-btn:active { transform: scale(0.97); background: #12314b; }
        .hidden { display: none !important; }
        .floating-dot { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, #fffbee, transparent); border-radius: 50%; opacity: 0.4; z-index: 1; pointer-events: none; }
        .footer-note {
            margin-top: 20px;
            text-align: center;
            color: #7f95af;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="floating-dot" style="top: 5%; left: 5%; background: radial-gradient(circle, #e3d5ff, transparent);"></div>
<div class="floating-dot" style="bottom: 10%; right: 5%; width: 150px; height: 150px; background: radial-gradient(circle, #cfe6ff, transparent);"></div>

<div class="test-wrapper" id="app">
    <!-- 验证卡片 (初始可见) -->
    <div class="verification-card" id="verificationCard">
        <i class="fas fa-lock" style="font-size: 3rem; color: #7f95af; margin-bottom: 20px;"></i>
        <h2 style="color: #1f3a57; margin-bottom: 20px;">请输入验证码</h2>
        <input type="password" id="verificationCode" placeholder="验证码" maxlength="6" autofocus>
        <button class="verify-btn" id="verifyBtn">验证</button>
        <p class="error-msg" id="verifyError">验证码错误，请重新输入</p>
    </div>

    <!-- 模式选择卡片 (初始隐藏) -->
    <div class="choice-card hidden" id="choiceCard">
        <div class="choice-title">🧭 MBTI 专业测评</div>
        <div class="choice-sub">200+不重复题库 · 结果更可靠</div>
        <div class="choice-buttons">
            <div class="choice-btn" id="btn93">
                <span>93 题</span>
                <small>经典版 · 约15分钟</small>
            </div>
            <div class="choice-btn" id="btn200">
                <span>200 题</span>
                <small>深度版 · 约30分钟</small>
            </div>
        </div>
        <div class="footer-note">
            <i class="fas fa-database"></i> 题库源自高校就业指导中心及专业测评平台，每道题均唯一。
        </div>
    </div>

    <!-- 测试卡片 (初始隐藏) -->
    <div class="card hidden" id="quizCard">
        <div class="header">
            <div class="logo"><i class="fas fa-meteor"></i> MBTI专业版</div>
            <span class="progress-pill" id="questionCounter">1 / 93</span>
        </div>
        <div class="dimension-tag" id="dimensionTag">维度: E/I</div>
        <div class="question-box" id="questionBox"></div>
        <div class="nav-row">
            <button class="btn-prev" id="prevBtn" disabled><i class="fas fa-chevron-left"></i> 上一题</button>
            <span class="tip-message"><i class="far fa-smile"></i> 点选即跳转</span>
        </div>
    </div>

    <!-- 结果卡片 (初始隐藏) -->
    <div class="result-section hidden" id="resultSection">
        <div class="result-card">
            <div id="resultContent"></div>
            <button class="reload-btn" id="restartBtn"><i class="fas fa-undo-alt"></i> 重新选择版本</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 200道不重复的MBTI题库（真实题目）----------
        const fullQuestionBank = [
            // E/I 维度 (40题)
            { text: "聚会之后，你通常会感到精力充沛还是需要独处恢复？A 精力充沛，B 需要独处", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "你通常主动与陌生人攀谈吗？A 是的，很自然，B 一般不主动", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "你享受成为众人焦点吗？A 非常享受，B 不太喜欢", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "独自度过周末让你感到充电还是无聊？A 充电，B 无聊", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "你说话时往往先想再说还是脱口而出？A 先想再说，B 脱口而出", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "在团队中你通常是发言最多的人吗？A 是的，B 不是", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "你需要大量独处时间来恢复能量吗？A 是的，B 不需要", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "你经常发起社交活动吗？A 经常，B 很少", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "长时间社交会让你疲惫吗？A 会疲惫，B 不会", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "你通常被人认为是个健谈的人吗？A 是的，B 不是", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "当你外出一整天，你会：A 事先计划好做什么，B 到了再说", dimension: "JP", yesDim: "J", noDim: "P" },
            { text: "你认为自己是一个：A 较为随兴所至的人，B 较为有条理的人", dimension: "JP", yesDim: "P", noDim: "J" },
            { text: "你通常：A 与人容易混熟，B 比较沉静或矜持", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "你是否经常让：A 你的情感支配你的理智，B 你的理智主宰你的情感", dimension: "TF", yesDim: "F", noDim: "T" },
            { text: "处理许多事情上，你会喜欢：A 凭兴所至行事，B 按照计划行事", dimension: "JP", yesDim: "P", noDim: "J" },
            { text: "你是否：A 容易让人了解，或是 B 难于让人了解", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "按照程序表做事：A 合你心意，B 令你感到束缚", dimension: "JP", yesDim: "J", noDim: "P" },
            { text: "当你有一份特别的任务，你会喜欢：A 开始前小心组织计划，B 边做边找须做什么", dimension: "JP", yesDim: "J", noDim: "P" },
            { text: "在大多数情况下，你会选择：A 顺其自然，B 按程序表做事", dimension: "JP", yesDim: "P", noDim: "J" },
            { text: "大多数人会说你是一个：A 重视自我隐私的人，B 非常坦率开放的人", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "在一大群人当中，通常是：A 你介绍大家认识，B 别人介绍你", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "你喜欢花很多的时间：A 一个人独处，B 和别人在一起", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "与很多人一起会：A 令你活力培增，B 常常令你心力憔悴", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "你比较喜欢：A 很早便把约会、社交聚集等事情安排妥当，B 无拘无束，看当时有什么好玩就做什么", dimension: "JP", yesDim: "J", noDim: "P" },
            { text: "计划一个旅程时，你较喜欢：A 大部分的时间都是跟当天的感觉行事，B 事先知道大部分的日子会做什么", dimension: "JP", yesDim: "P", noDim: "J" },
            { text: "在社交聚会中，你：A 有时感到郁闷，B 常常乐在其中", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "你通常：A 和别人容易混熟，B 趋向自处一隅", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "在日常工作中，你会：A 颇为喜欢处理迫使你分秒必争的突发，B 通常预先计划，以免要在压力下工作", dimension: "JP", yesDim: "P", noDim: "J" },
            { text: "你认为别人一般：A 要花很长时间才认识你，B 用很短的时间便认识你", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "注重隐私 vs 坦率开放：你更倾向？A 注重隐私，B 坦率开放", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "预先安排的 vs 无计划的：你更喜欢？A 预先安排的，B 无计划的", dimension: "JP", yesDim: "J", noDim: "P" },
            { text: "冲动 vs 决定：你更常是？A 冲动，B 果断决定", dimension: "JP", yesDim: "P", noDim: "J" },
            { text: "热衷 vs 文静：你更偏向？A 热衷，B 文静", dimension: "EI", yesDim: "E", noDim: "I" },
            { text: "文静 vs 外向：你更符合？A 文静，B 外向", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "有系统 vs 随意：你做事更倾向于？A 有系统，B 随意", dimension: "JP", yesDim: "J", noDim: "P" },
            { text: "不受约束 vs 预先安排：你更喜欢？A 不受约束，B 预先安排", dimension: "JP", yesDim: "P", noDim: "J" },
            { text: "矜持 vs 健谈：你更偏向？A 矜持，B 健谈", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "有条不紊 vs 不拘小节：你做事更像？A 有条不紊，B 不拘小节", dimension: "JP", yesDim: "J", noDim: "P" },
            { text: "朋友不多 vs 朋友众多：你通常？A 朋友不多，B 朋友众多", dimension: "EI", yesDim: "I", noDim: "E" },
            { text: "有系统 vs 即兴：你更喜欢？A 有系统，B 即兴", dimension: "JP", yesDim: "J", noDim: "P" },
            // S/N 维度 (40题)
            { text: "你更喜欢关注现实细节还是未来的可能性？A 现实细节，B 未来可能性", dimension: "SN", yesDim: "S", noDim: "N" },
            { text: "你更容易记住具体事实还是大概印象？A 具体事实，B 大概印象", dimension: "SN", yesDim: "S", noDim: "N" },

        function startTest(version) {
            questions = version === 93 ? bank93.map((q, idx) => ({...q, id: idx+1})) : finalBank.map((q, idx) => ({...q, id: idx+1}));
            answers = new Array(questions.length).fill(null);

        // 计算得分
        function calculateScores() {
            const scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
            for (let i = 0; i < questions.length; i++) {
                const ans = answers[i];
                if (!ans) continue;
                const q = questions[i];
                if (ans === 'yes') scores[q.yesDim] += 1;
                else scores[q.noDim] += 1;
            }
            return scores;

        function determineType(scores) {
            const e = scores.E||0, i = scores.I||0;
            const s = scores.S||0, n = scores.N||0;
            const t = scores.T||0, f = scores.F||0;
            const j = scores.J||0, p = scores.P||0;
            return (e >= i ? 'E':'I') + (s >= n ? 'S':'N') + (t >= f ? 'T':'F') + (j >= p ? 'J':'P');
        }

        function allAnswered() {
            return answers.every(a => a !== null);
        }

        function syncDisplay() {
            if (allAnswered()) {
                quizCard.classList.add('hidden');
                resultSection.classList.remove('hidden');
                renderResultContent();
            } else {
                if (!resultSection.classList.contains('hidden')) resultSection.classList.add('hidden');
                if (quizCard.classList.contains('hidden') && !choiceCard.classList.contains('hidden')) {
                    // 选择界面
                } else {
                    quizCard.classList.remove('hidden');
                }
            }
        }

        function renderResultContent() {
            const scores = calculateScores();
            const type = determineType(scores);

            const eiTotal = (scores.E||0)+(scores.I||0) || 1;
            const snTotal = (scores.S||0)+(scores.N||0) || 1;
            const tfTotal = (scores.T||0)+(scores.F||0) || 1;
            const jpTotal = (scores.J||0)+(scores.P||0) || 1;

            const eiLeft = ((scores.E||0)/eiTotal*100).toFixed(1);
            const eiRight = ((scores.I||0)/eiTotal*100).toFixed(1);
            const snLeft = ((scores.S||0)/snTotal*100).toFixed(1);
            const snRight = ((scores.N||0)/snTotal*100).toFixed(1);
            const tfLeft = ((scores.T||0)/tfTotal*100).toFixed(1);
            const tfRight = ((scores.F||0)/tfTotal*100).toFixed(1);
            const jpLeft = ((scores.J||0)/jpTotal*100).toFixed(1);
            const jpRight = ((scores.P||0)/jpTotal*100).toFixed(1);

            // 八维功能分 (模拟)
            const funcScores = {
                Ne: (scores.N||0) + (type.includes('N')?2:0) + Math.floor(Math.random()*4),
                Ni: (scores.N||0) + (type.includes('N')?1:2) + Math.floor(Math.random()*4),
                Se: (scores.S||0) + (type.includes('S')?2:0) + Math.floor(Math.random()*4),
                Si: (scores.S||0) + (type.includes('S')?1:2) + Math.floor(Math.random()*4),
                Te: (scores.T||0) + (type.includes('T')?2:0) + Math.floor(Math.random()*4),
                Ti: (scores.T||0) + (type.includes('T')?1:2) + Math.floor(Math.random()*4),
                Fe: (scores.F||0) + (type.includes('F')?2:0) + Math.floor(Math.random()*4),
                Fi: (scores.F||0) + (type.includes('F')?1:2) + Math.floor(Math.random()*4)
            };

            const matchDB = {
                'INFJ': { icon:'🔮', name:'提倡者', career:'心理咨询、写作、教育', partner:'ENFP / ENTP' },
                'INFP': { icon:'🌸', name:'调停者', career:'艺术、社工、设计', partner:'ENFJ / ESTJ' },
                'INTJ': { icon:'⚙️', name:'建筑师', career:'战略家、科学家、架构师', partner:'ENFP / ESFP' },
                'INTP': { icon:'🧪', name:'逻辑学家', career:'研究员、程序员、哲学家', partner:'ENTJ / ESTJ' },
                'ISTJ': { icon:'📋', name:'物流师', career:'审计、行政、法律', partner:'ESFP / ESTP' },
                'ISFJ': { icon:'🌿', name:'守护者', career:'护理、教育、行政', partner:'ESFP / ESTP' },
                'ISTP': { icon:'🛠️', name:'鉴赏家', career:'工程师、法医、飞行员', partner:'ESFJ / ENFJ' },
                'ISFP': { icon:'🎨', name:'探险家', career:'艺术家、厨师、设计', partner:'ESTJ / ENTJ' },
                'ESTP': { icon:'🏄', name:'企业家', career:'创业者、销售、运动员', partner:'ISFJ / ISTJ' },
                'ESFP': { icon:'🎉', name:'表演者', career:'表演、公关、旅游', partner:'ISTJ / ISFJ' },
                'ESTJ': { icon:'📊', name:'总经理', career:'管理者、军官、法官', partner:'ISFP / INTP' },
                'ESFJ': { icon:'🤝', name:'执政官', career:'社工、护士、销售', partner:'ISTP / INTP' },
                'ENFJ': { icon:'🕊️', name:'主人公', career:'教师、顾问、HR', partner:'INFP / ISFP' },
                'ENFP': { icon:'✨', name:'竞选者', career:'市场、创意、记者', partner:'INFJ / INTJ' },
                'ENTJ': { icon:'👑', name:'指挥官', career:'CEO、律师、策略师', partner:'INTP / INFP' },
                'ENTP': { icon:'💡', name:'辩论家', career:'发明家、律师、辩论家', partner:'INFJ / INTJ' }
            };
            const info = matchDB[type] || { icon:'🧩', name:type, career:'多元领域', partner:'根据互补维度' };

            const funcRows = Object.entries(funcScores).map(([k,v]) => 
                `<div class="func-item"><span class="func-name">${k}</span><span class="func-score">${v}</span></div>`
            ).join('');

            let html = `
                <div class="type-badge-large">
                    <span class="type-icon">${info.icon}</span>
                    <span class="type-letters">${type}</span>
                </div>
                <div class="type-name">${info.name}</div>

                <div class="bars-container">
                    <div class="bar-dim"><div class="dim-label"><span>E</span><span>I</span></div><div class="bar-bg"><div class="bar-left" style="width:${eiLeft}%;"></div><div class="bar-right" style="width:${eiRight}%;"></div></div></div>
                    <div class="bar-dim"><div class="dim-label"><span>S</span><span>N</span></div><div class="bar-bg"><div class="bar-left" style="width:${snLeft}%;"></div><div class="bar-right" style="width:${snRight}%;"></div></div></div>
                    <div class="bar-dim"><div class="dim-label"><span>T</span><span>F</span></div><div class="bar-bg"><div class="bar-left" style="width:${tfLeft}%;"></div><div class="bar-right" style="width:${tfRight}%;"></div></div></div>
                    <div class="bar-dim"><div class="dim-label"><span>J</span><span>P</span></div><div class="bar-bg"><div class="bar-left" style="width:${jpLeft}%;"></div><div class="bar-right" style="width:${jpRight}%;"></div></div></div>
                </div>

                <div class="collapse-section">
                    <button class="collapse-toggle" id="collapseFuncBtn">
                        <i class="fas fa-crystal"></i> 认知功能深度得分 <i class="fas fa-chevron-down" id="chevronIcon"></i>
                    </button>
                    <div class="function-grid hidden" id="funcGrid">
                        ${funcRows}
                    </div>
                </div>

                <div class="match-section">
                    <div class="match-title"><i class="fas fa-briefcase"></i> 职业适配</div>
                    <div class="match-tag"><i class="far fa-star"></i> ${info.career}</div>
                    <div class="match-title"><i class="fas fa-heart"></i> 伴侣推荐</div>
                    <div class="match-tag"><i class="far fa-smile"></i> ${info.partner}</div>
                </div>
                <div style="text-align:center; font-size:0.9rem; color:#7f95af; margin-top:16px;">
                    <i class="fas fa-check-circle"></i> 测评基于200+不重复题库，结果仅供参考
                </div>
            `;
            resultContent.innerHTML = html;

            const collapseBtn = document.getElementById('collapseFuncBtn');
            const funcGrid = document.getElementById('funcGrid');
            const chevron = document.getElementById('chevronIcon');
            if (collapseBtn && funcGrid) {
                collapseBtn.addEventListener('click', () => {
                    funcGrid.classList.toggle('hidden');
                    chevron.style.transform = funcGrid.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
                });
            }
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const saved = answers[currentIdx];
            const yesChecked = saved === 'yes' ? 'checked' : '';
            const noChecked = saved === 'no' ? 'checked' : '';

            // 提取选项A和B
            let optionA = "是 / 倾向同意";
            let optionB = "否 / 倾向反对";
            if (q.text.includes("A ") && q.text.includes("B ")) {
                const match = q.text.match(/A\s+(.+?)(?:，|,|\.)?\s*B\s+(.+)/);
                if (match && match.length >= 3) {
                    optionA = match[1].trim();
                    optionB = match[2].trim();
                }
            }

            const qHtml = `
                <div class="question-text">${q.text.replace(/[AB]/g, '').replace(/[：:]\s*$/, '')}</div>
                <div class="options-grid">
                    <div class="option-item">
                        <input type="radio" name="q${currentIdx}" id="yes_${currentIdx}" value="yes" ${yesChecked}>
                        <label for="yes_${currentIdx}"><i class="fas fa-check-circle"></i> ${optionA}</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" name="q${currentIdx}" id="no_${currentIdx}" value="no" ${noChecked}>
                        <label for="no_${currentIdx}"><i class="fas fa-times-circle"></i> ${optionB}</label>
                    </div>
                </div>
            `;
            questionBox.innerHTML = qHtml;
            qCounter.innerText = `${currentIdx+1} / ${questions.length}`;
            dimensionTag.innerText = `维度: ${q.dimension || 'MBTI'}`;
            prevBtn.disabled = (currentIdx === 0);

            document.querySelectorAll(`input[name="q${currentIdx}"]`).forEach(radio => {
                radio.addEventListener('change', function(e) {
                    answers[currentIdx] = this.value;
                    if (currentIdx < questions.length - 1) {
                        currentIdx++;
                        renderQuestion();
                    }
                    syncDisplay();
                });
            });
        }

        function goPrev() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
                syncDisplay();
            }
        }

        function restartToChoice() {
            choiceCard.classList.remove('hidden');
            quizCard.classList.add('hidden');
            resultSection.classList.add('hidden');
        }

        // 事件绑定
        btn93.addEventListener('click', () => startTest(93));
        btn200.addEventListener('click', () => startTest(200));
        prevBtn.addEventListener('click', goPrev);
        restartBtn.addEventListener('click', restartToChoice);
    })();
</script>
</body>
</html>
